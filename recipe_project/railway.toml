[build]
builder = "NIXPACKS"

[deploy]
startCommand = "cd recipe_project && python manage.py collectstatic --noinput --clear && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[env]
DJANGO_SETTINGS_MODULE = "config.settings.prod"