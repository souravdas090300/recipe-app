[build]
builder = "NIXPACKS"
buildCommand = "cd recipe_project && pip install -r requirements/requirements.txt"

[deploy]
startCommand = "cd recipe_project && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120"
releaseCommand = "cd recipe_project && python manage.py migrate --settings=config.settings.prod && python manage.py collectstatic --noinput --settings=config.settings.prod"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3